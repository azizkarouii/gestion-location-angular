<div class="shell">
  <header class="topbar" *ngIf="authService.isLoggedIn()">
    <a routerLink="/dashboard" class="brand">🏠 Gestion Location</a>

    <nav class="nav-links">
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/locataires" routerLinkActive="active">Locataires</a>
      <a routerLink="/paiements" routerLinkActive="active">Paiements</a>
      <a routerLink="/residences" routerLinkActive="active">Maisons/Appartements</a>
      <a routerLink="/profil-proprietaire" routerLinkActive="active">Profil propriétaire</a>
    </nav>

    <div class="header-actions">
      <button mat-icon-button type="button" class="theme-btn" (click)="toggleTheme()" [attr.aria-label]="isDarkMode ? 'Activer le mode clair' : 'Activer le mode sombre'">
        <mat-icon>{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
      <button mat-stroked-button color="warn" type="button" class="logout-btn" (click)="logout()">Déconnexion</button>
    </div>
  </header>

  <main class="content">
    <router-outlet />
  </main>
</div>
